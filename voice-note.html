<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send a Voice Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --burgundy:#5c1a2e;
    --burgundy-deep:#3d0f1e;
    --gold:#b98a3e;
    --gold-light:#d9b874;
    --cream:#faf6f0;
    --red:#c0392b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(160deg,var(--burgundy-deep) 0%,var(--burgundy) 55%,#4a1424 100%);
    font-family:'Lora',serif;
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:460px;
    background:rgba(250,246,240,0.03);
    border:1px solid rgba(217,184,116,0.35);
    border-radius:16px;
    padding:44px 34px;
    backdrop-filter:blur(6px);
    text-align:center;
  }
  h1{
    font-family:'Playfair Display',serif;
    font-size:25px;
    font-weight:600;
    margin:0 0 6px;
    color:var(--gold-light);
  }
  .sub{
    font-size:14px;
    color:rgba(250,246,240,0.65);
    margin:0 0 32px;
  }

  #recordBtn{
    width:110px;
    height:110px;
    border-radius:50%;
    border:2px solid var(--gold-light);
    background:radial-gradient(circle at 35% 30%, #7a2340, var(--burgundy-deep));
    color:var(--gold-light);
    font-size:32px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto;
    transition:all 0.25s ease;
  }
  #recordBtn.recording{
    background:radial-gradient(circle at 35% 30%, #d24534, var(--red));
    border-color:var(--red);
    animation:pulse 1.6s infinite;
  }
  #recordBtn:disabled{opacity:0.4;cursor:not-allowed;animation:none;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(192,57,43,0.5);}
    70%{box-shadow:0 0 0 18px rgba(192,57,43,0);}
    100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}
  }

  #hint{
    margin-top:18px;
    font-size:13px;
    color:rgba(250,246,240,0.55);
    min-height:18px;
  }

  #liveText{
    width:100%;
    margin-top:8px;
    padding:14px;
    min-height:50px;
    background:rgba(0,0,0,0.2);
    border:1px solid rgba(217,184,116,0.25);
    border-radius:8px;
    font-family:'Lora',serif;
    font-size:14px;
    line-height:1.6;
    color:rgba(250,246,240,0.9);
    text-align:left;
    resize:vertical;
  }
  #liveText::placeholder{
    color:rgba(250,246,240,0.35);
  }
  #liveText:focus{
    outline:none;
    border-color:var(--gold-light);
  }

  #logBtn{
    display:none;
    width:100%;
    margin-top:22px;
    padding:15px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,var(--gold) 0%,#a1782f 100%);
    color:var(--burgundy-deep);
    font-family:'Lora',serif;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.4px;
    cursor:pointer;
  }
  #logBtn.show{display:block;}
  #logBtn:disabled{opacity:0.5;cursor:not-allowed;}
  #logBtn:not(:disabled):hover{opacity:0.9;}

  #status{
    margin-top:20px;
    font-size:13.5px;
    min-height:18px;
  }
  #status.success{color:#8fbf8f;}
  #status.error{color:#e39a9a;}
  #status.working{color:var(--gold-light);}
</style>
</head>
<body>
  <div class="card">
    <h1>Send a Voice Note</h1>
    <p class="sub">Tap to record, then tap Log to Sheet.</p>

    <button id="recordBtn">🎙️</button>
    <div id="hint">Tap the mic to start</div>

    <div style="margin-top:20px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(217,184,116,0.7);text-align:left;">Transcript (speak or type)</div>
    <textarea id="liveText" rows="4" placeholder="Tap the mic and speak, or type here directly…"></textarea>

    <button id="logBtn">Log to Sheet</button>

    <div id="status"></div>
  </div>

<script>
  // Paste your deployed Apps Script Web App URL here.
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxhrJZgo9Jkc-qYb3IemhzM0WBmmy1S6yoU2Nuop28KceuyreWOs9hE14zGZ20ERVqC/exec';

  const recordBtn = document.getElementById('recordBtn');
  const hintEl = document.getElementById('hint');
  const liveTextEl = document.getElementById('liveText');
  const logBtn = document.getElementById('logBtn');
  const statusEl = document.getElementById('status');

  let recognition = null;
  let isRecording = false;
  let finalTranscript = '';   // confirmed text across all sessions (persists through restarts)
  let sessionFinal = '';      // confirmed text within the current recognition session only

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    hintEl.textContent = 'This browser doesn\'t support voice recognition. Please use Chrome.';
    recordBtn.disabled = true;
  } else {
    recognition = new SpeechRecognition();
    recognition.continuous = false;   // capture one utterance at a time, then auto-restart — avoids Chrome's cumulative-result bug in continuous mode
    recognition.interimResults = true;
    recognition.lang = 'en-IN';

    recognition.onresult = (event) => {
      let sessionFinalRebuilt = '';
      let interim = '';
      for (let i = 0; i < event.results.length; i++) {
        const text = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          sessionFinalRebuilt += text + ' ';
        } else {
          interim += text;
        }
      }
      sessionFinal = sessionFinalRebuilt;
      liveTextEl.value = (finalTranscript + sessionFinal + interim).replace(/\s+/g, ' ').trim();
    };

    recognition.onerror = (event) => {
      // "no-speech" fires often in chunked mode during natural pauses — not a real error, just restart quietly.
      if (event.error === 'no-speech' || event.error === 'aborted') {
        return;
      }
      statusEl.textContent = 'Mic error: ' + event.error;
      statusEl.className = 'error';
      stopRecording();
    };

    recognition.onend = () => {
      finalTranscript = (finalTranscript + sessionFinal).replace(/\s+/g, ' ').trim() + ' ';
      sessionFinal = '';
      if (isRecording) {
        try {
          recognition.start();
        } catch (e) {
          setTimeout(() => { if (isRecording) recognition.start(); }, 150);
        }
      }
    };
  }

  function startRecording() {
    finalTranscript = '';
    sessionFinal = '';
    liveTextEl.value = '';
    logBtn.classList.remove('show');
    statusEl.textContent = '';
    statusEl.className = '';

    try {
      recognition.start();
      isRecording = true;
      recordBtn.classList.add('recording');
      recordBtn.textContent = '⏹️';
      hintEl.textContent = 'Listening… tap to stop';
    } catch (err) {
      statusEl.textContent = 'Could not start mic: ' + err.message;
      statusEl.className = 'error';
    }
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) recognition.stop();
    recordBtn.classList.remove('recording');
    recordBtn.textContent = '🎙️';

    if (liveTextEl.value.trim()) {
      hintEl.textContent = 'Tap Log to Sheet, or tap the mic to re-record';
      logBtn.classList.add('show');
    } else {
      hintEl.textContent = 'Tap the mic to start';
    }
  }

  recordBtn.addEventListener('click', () => {
    if (isRecording) stopRecording();
    else startRecording();
  });

  logBtn.addEventListener('click', async () => {
    const transcript = liveTextEl.value.trim();
    if (!transcript) return;

    logBtn.disabled = true;
    recordBtn.disabled = true;
    statusEl.textContent = 'Logging…';
    statusEl.className = 'working';

    try {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ transcript: transcript })
      });
      const result = await response.json();

      if (result.success) {
        statusEl.textContent = '✓ Logged to the sheet.';
        statusEl.className = 'success';
        logBtn.classList.remove('show');
        liveTextEl.value = '';
        hintEl.textContent = 'Tap the mic to send another';
        finalTranscript = '';
      } else {
        statusEl.textContent = 'Error: ' + (result.error || 'Unknown error');
        statusEl.className = 'error';
      }
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'error';
    } finally {
      logBtn.disabled = false;
      recordBtn.disabled = false;
    }
  });
</script>
</body>
</html>
